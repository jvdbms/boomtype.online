kind = "mobile"
previewPath = "/mobile/"
title = "BoomType Mobile"
version = "1.0.0"
id = "artifacts/boomtype-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 8000

[services.development]
run = "pnpm --filter @workspace/boomtype-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/boomtype-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/boomtype-mobile", "run", "serve" ]

[services.env]
PORT = "8000"
BASE_PATH = "/mobile/"
