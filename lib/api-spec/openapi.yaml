openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: BoomType Typing Tutor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scores
    description: Typing test scores
  - name: leaderboard
    description: Leaderboard operations
  - name: users
    description: User profile operations
  - name: stats
    description: Statistics and aggregates

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scores:
    post:
      operationId: submitScore
      tags: [scores]
      summary: Submit a typing test score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitScoreBody"
      responses:
        "201":
          description: Score submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard entries
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, all_time]
            default: all_time
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /leaderboard/me:
    get:
      operationId: getMyLeaderboardRank
      tags: [leaderboard]
      summary: Get the current user's rank and best WPM for a period
      parameters:
        - name: nickname
          in: query
          required: true
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, all_time]
            default: all_time
      responses:
        "200":
          description: User's rank info for the period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyLeaderboardRank"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get platform-wide stats summary
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/recent:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent test completions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"

  /scores/games:
    post:
      operationId: submitGameScore
      tags: [scores]
      summary: Submit a mini-game score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitGameScoreBody"
      responses:
        "201":
          description: Game score submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameScore"
    get:
      operationId: getGameLeaderboard
      tags: [leaderboard]
      summary: Get mini-game leaderboard for a specific game
      parameters:
        - name: game
          in: query
          required: true
          schema:
            type: string
            enum: [word-rain, zombie-attack, speed-burst]
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Game leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameLeaderboardEntry"

  /leaderboard/games-xp:
    get:
      operationId: getGameXpLeaderboard
      tags: [leaderboard]
      summary: Get global mini-game XP leaderboard (ranks players by total game XP)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Game XP leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameXpLeaderboardEntry"

  /leaderboard/games-xp/me:
    get:
      operationId: getMyGameXpRank
      tags: [leaderboard]
      summary: Get the current user's global game XP rank
      parameters:
        - name: nickname
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User's game XP rank info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyGameXpRank"

  /users/{nickname}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user profile and personal bests
      parameters:
        - name: nickname
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SubmitScoreBody:
      type: object
      properties:
        nickname:
          type: string
        wpm:
          type: number
        accuracy:
          type: number
        duration:
          type: integer
          description: Test duration in seconds (30 or 60)
        mistakes:
          type: integer
      required:
        - nickname
        - wpm
        - accuracy
        - duration
        - mistakes

    Score:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        wpm:
          type: number
        accuracy:
          type: number
        duration:
          type: integer
        mistakes:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nickname
        - wpm
        - accuracy
        - duration
        - mistakes
        - createdAt

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        nickname:
          type: string
        wpm:
          type: number
        accuracy:
          type: number
        testsCount:
          type: integer
        level:
          type: string
      required:
        - rank
        - nickname
        - wpm
        - accuracy
        - testsCount
        - level

    StatsSummary:
      type: object
      properties:
        totalTests:
          type: integer
        testsToday:
          type: integer
        avgWpm:
          type: number
        topWpm:
          type: number
        totalUsers:
          type: integer
      required:
        - totalTests
        - testsToday
        - avgWpm
        - topWpm
        - totalUsers

    UserProfile:
      type: object
      properties:
        nickname:
          type: string
        bestWpm:
          type: number
        avgWpm:
          type: number
        avgAccuracy:
          type: number
        totalTests:
          type: integer
        level:
          type: string
        xp:
          type: integer
        streak:
          type: integer
        recentScores:
          type: array
          items:
            $ref: "#/components/schemas/Score"
      required:
        - nickname
        - bestWpm
        - avgWpm
        - avgAccuracy
        - totalTests
        - level
        - xp
        - streak
        - recentScores

    SubmitGameScoreBody:
      type: object
      properties:
        nickname:
          type: string
        game:
          type: string
          enum: [word-rain, zombie-attack, speed-burst]
        score:
          type: integer
      required:
        - nickname
        - game
        - score

    GameScore:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        game:
          type: string
        score:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nickname
        - game
        - score
        - createdAt

    GameLeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        nickname:
          type: string
        score:
          type: integer
      required:
        - rank
        - nickname
        - score

    GameXpLeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        nickname:
          type: string
        xp:
          type: integer
        gamesPlayed:
          type: integer
      required:
        - rank
        - nickname
        - xp
        - gamesPlayed

    MyGameXpRank:
      type: object
      properties:
        nickname:
          type: string
        rank:
          type: integer
          nullable: true
          description: User's global rank by total mini-game XP. Null if no game scores.
        xp:
          type: integer
          description: User's total mini-game XP.
        totalPlayers:
          type: integer
          description: Total distinct players with mini-game scores.
      required:
        - nickname
        - rank
        - xp
        - totalPlayers

    MyLeaderboardRank:
      type: object
      properties:
        nickname:
          type: string
        period:
          type: string
          enum: [daily, weekly, all_time]
        rank:
          type: integer
          nullable: true
          description: User's rank in this period. Null if no scores in this period.
        bestWpm:
          type: number
          nullable: true
          description: User's best WPM in this period. Null if no scores in this period.
        totalPlayers:
          type: integer
          description: Total distinct players with scores in this period.
      required:
        - nickname
        - period
        - rank
        - bestWpm
        - totalPlayers

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
